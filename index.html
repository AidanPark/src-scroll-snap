/* ═══════════════════════════════════════════════════════════════
   Capture Engine — Row SAD Matching + Progressive Strip Extraction
   ═══════════════════════════════════════════════════════════════ */

var CaptureEngine = {
  // Convert ImageData to grayscale Uint8Array
  toGray: function(imageData) {
    var w = imageData.width;
    var h = imageData.height;
    var d = imageData.data;
    var out = new Uint8Array(w * h);
    for (var i = 0, j = 0; i < d.length; i += 4, j++) {
      out[j] = (d[i] * 77 + d[i+1] * 150 + d[i+2] * 29) >> 8;
    }
    return { data: out, width: w, height: h };
  },

  // Row-based SAD matching with early exit.
  // Finds distinctive reference rows near the bottom of prevGray, then locates them in currGray.
  // hintDeltaY: previous frame's deltaY (0 if unknown) — narrows search range.
  // Returns { deltaY, confidence } where deltaY = new content height in pixels.
  rowMatch: function(prevGray, currGray, direction, hintDeltaY) {
    var isVert = direction !== 'horizontal';
    var w = prevGray.width;
    var h = prevGray.height;
    var pd = prevGray.data;
    var cd = currGray.data;

    var BAIL_PER_PIXEL = 30;
    var VALIDATE_ROWS = 30;
    var VALIDATE_MAX_AVG = 20;
    var MIN_VARIANCE = 50;           // lowered: Swagger UI has sparse text on white bg
    var STRIP_W = 80;          // each L/C/R strip width in pixels
    // UNIQUENESS test removed — too strict for repeating UI patterns (Swagger)

    if (isVert) {
      // --- L/C/R strip positions (3 horizontal strips) ---
      var strips = [
        { x0: Math.max(0, (w * 0.2 - STRIP_W / 2) | 0) },
        { x0: Math.max(0, (w * 0.5 - STRIP_W / 2) | 0) },
        { x0: Math.max(0, (w * 0.8 - STRIP_W / 2) | 0) },
      ];
      var sw = Math.min(STRIP_W, w);  // actual strip width
      for (var si = 0; si < strips.length; si++) {
        if (strips[si].x0 + sw > w) strips[si].x0 = w - sw;
      }

      // --- Scan bottom half for distinctive reference rows ---
      // Use FULL row width for variance (center strip may miss text in Swagger UI)
      var rowPool = [];
      var scanFrom = Math.max(0, Math.floor(h / 2));
      for (var ry = scanFrom; ry < h - 3; ry++) {
        var sum = 0, sumSq = 0, sn = 0;
        for (var sx = 0; sx < w; sx += 8) {
          var v = pd[ry * w + sx];
          sum += v; sumSq += v * v; sn++;
        }
        var mean = sum / sn;
        var variance = sumSq / sn - mean * mean;
        if (variance > MIN_VARIANCE) rowPool.push({ row: ry, v: variance });
      }
      // Fallback: scan upward to h/4 with lower threshold, also full width
      if (rowPool.length === 0) {
        var fallbackLimit = Math.max(0, Math.floor(h / 4));
        for (var ry = scanFrom - 1; ry >= fallbackLimit; ry--) {
          var sum = 0, sumSq = 0, sn = 0;
          for (var sx = 0; sx < w; sx += 8) {
            var v = pd[ry * w + sx];
            sum += v; sumSq += v * v; sn++;
          }
          var mean = sum / sn;
          var variance = sumSq / sn - mean * mean;
          if (variance > MIN_VARIANCE * 0.25) { rowPool.push({ row: ry, v: variance }); break; }
        }
      }
      if (rowPool.length === 0) return { deltaY: 0, confidence: 0, reason: 'no-refrows' };
      // Pick top 5 by variance with min 5px spacing
      rowPool.sort(function(a, b) { return b.v - a.v; });
      var refRows = [rowPool[0].row];
      for (var pi = 1; pi < rowPool.length && refRows.length < 5; pi++) {
        var tooClose = false;
        for (var ri = 0; ri < refRows.length; ri++) {
          if (Math.abs(rowPool[pi].row - refRows[ri]) < 5) { tooClose = true; break; }
        }
        if (!tooClose) refRows.push(rowPool[pi].row);
      }

      // --- Precompute gradient for reference rows at each strip ---
      // gradient[stripIdx][refRowIdx] = Int16Array of horizontal differences
      var refGrads = [];
      for (var si = 0; si < strips.length; si++) {
        var stripGrads = [];
        for (var ri = 0; ri < refRows.length; ri++) {
          var g = new Int16Array(sw - 1);
          var rowOff = refRows[ri] * w + strips[si].x0;
          for (var gx = 1; gx < sw; gx++) {
            g[gx - 1] = pd[rowOff + gx] - pd[rowOff + gx - 1];
          }
          stripGrads.push(g);
        }
        refGrads.push(stripGrads);
      }

      // --- Determine search range ---
      var minRef = refRows[0];
      for (var ri = 1; ri < refRows.length; ri++) {
        if (refRows[ri] < minRef) minRef = refRows[ri];
      }
      var maxY = minRef - 4;  // match must be above lowest reference row
      if (maxY < 0) return { deltaY: 0, confidence: 0, reason: 'search-range' };

      // --- Full search: find top K candidates (no early break) ---
      var CANDIDATES_K = 5;
      var topK = [];  // { score, row } sorted ascending by score
      var stripBail = BAIL_PER_PIXEL * sw;

      for (var y = maxY; y >= 0; y--) {
        var totalScore = 0;
        var bailed = false;

        // Score = average of (pixelSAD + gradientSAD) across all strips and ref rows
        for (var si = 0; si < strips.length && !bailed; si++) {
          for (var ri = 0; ri < refRows.length && !bailed; ri++) {
            var refOff = refRows[ri] * w + strips[si].x0;
            var dy = refRows[ri] - minRef;
            var curY = y + dy;
            if (curY < 0 || curY >= h) { bailed = true; break; }
            var curOff = curY * w + strips[si].x0;

            // Pixel SAD
            var pSAD = 0;
            for (var x = 0; x < sw; x++) {
              pSAD += Math.abs(pd[refOff + x] - cd[curOff + x]);
              if (pSAD > stripBail) { bailed = true; break; }
            }
            if (bailed) break;

            // Gradient SAD
            var gSAD = 0;
            var rg = refGrads[si][ri];
            for (var gx = 1; gx < sw; gx++) {
              var cg = cd[curOff + gx] - cd[curOff + gx - 1];
              gSAD += Math.abs(rg[gx - 1] - cg);
            }

            totalScore += pSAD / sw + gSAD / (sw - 1);
          }
        }

        if (bailed) continue;

        var nPairs = strips.length * refRows.length;
        var avgScore = totalScore / nPairs;

        // Insert into top K if good enough
        if (topK.length < CANDIDATES_K || avgScore < topK[topK.length - 1].score) {
          topK.push({ score: avgScore, row: y });
          topK.sort(function(a, b) { return a.score - b.score; });
          if (topK.length > CANDIDATES_K) topK.length = CANDIDATES_K;
        }
      }

      if (topK.length === 0) return { deltaY: 0, confidence: 0, reason: 'all-bailed(refs=' + refRows.length + ')' };

      // --- Validate each candidate in order (best score first) ---
      var lastVAvg = 0;  // track validation avg for diagnostics
      for (var ci = 0; ci < topK.length; ci++) {
        var cRow = topK[ci].row;
        var cScore = topK[ci].score;
        var deltaY = minRef - cRow;
        if (deltaY <= 0) continue;

        var vCheckCount = Math.min(VALIDATE_ROWS, Math.min(minRef, cRow));
        var vPass = true;
        if (vCheckCount > 5) {
          var vSAD = 0, vN = 0;
          var vcx0 = strips[1].x0;
          for (var vr = 1; vr <= vCheckCount; vr++) {
            var vRefOff = (minRef - vr) * w + vcx0;
            var vCurOff = (cRow - vr) * w + vcx0;
            for (var vx = 0; vx < sw; vx += 2) {
              vSAD += Math.abs(pd[vRefOff + vx] - cd[vCurOff + vx]);
              vN++;
            }
          }
          lastVAvg = vN > 0 ? vSAD / vN : 0;
          if (lastVAvg > VALIDATE_MAX_AVG) vPass = false;
        }
        if (!vPass) continue;

        var confidence = Math.max(0, Math.min(1, 1 - cScore / 30));
        return { deltaY: deltaY, confidence: confidence, reason: 'ok(ci=' + ci + ')', refRowCount: refRows.length };
      }

      // All candidates failed validation
      var dbg = topK[0];
      return { deltaY: 0, confidence: 0, reason: 'all-' + topK.length + '-failed(score=' + dbg.score.toFixed(1) + ',row=' + dbg.row + ',vAvg=' + lastVAvg.toFixed(1) + ')' };

    } else {
      // --- Horizontal: L/C/R strip matching with gradient + best match + uniqueness ---
      var STRIP_H = 80;
      var strips = [
        { y0: Math.max(0, (h * 0.2 - STRIP_H / 2) | 0) },
        { y0: Math.max(0, (h * 0.5 - STRIP_H / 2) | 0) },
        { y0: Math.max(0, (h * 0.8 - STRIP_H / 2) | 0) },
      ];
      var sh = Math.min(STRIP_H, h);
      for (var si = 0; si < strips.length; si++) {
        if (strips[si].y0 + sh > h) strips[si].y0 = h - sh;
      }

      // Find 3 spread reference columns
      var refCols = [];
      var candidates = [w - 30, w - 20, w - 10];
      for (var ci = 0; ci < candidates.length; ci++) {
        var rx = candidates[ci];
        if (rx < 0 || rx >= w) continue;
        var sum = 0, sumSq = 0, sn = 0;
        var cy0 = strips[1].y0;
        for (var sy = 0; sy < sh; sy += 4) {
          var v = pd[(cy0 + sy) * w + rx];
          sum += v; sumSq += v * v; sn++;
        }
        var mean = sum / sn;
        var variance = sumSq / sn - mean * mean;
        if (variance > MIN_VARIANCE) refCols.push(rx);
      }
      if (refCols.length === 0) {
        for (var rx = w - 10; rx >= 0; rx--) {
          var sum = 0, sumSq = 0, sn = 0;
          var cy0 = strips[1].y0;
          for (var sy = 0; sy < sh; sy += 4) {
            var v = pd[(cy0 + sy) * w + rx];
            sum += v; sumSq += v * v; sn++;
          }
          var mean = sum / sn;
          var variance = sumSq / sn - mean * mean;
          if (variance > MIN_VARIANCE) { refCols.push(rx); break; }
        }
      }
      if (refCols.length === 0) return { deltaY: 0, confidence: 0 };

      // Precompute vertical gradient for reference columns at each strip
      var refGrads = [];
      for (var si = 0; si < strips.length; si++) {
        var stripGrads = [];
        for (var ri = 0; ri < refCols.length; ri++) {
          var g = new Int16Array(sh - 1);
          for (var gy = 1; gy < sh; gy++) {
            g[gy - 1] = pd[(strips[si].y0 + gy) * w + refCols[ri]] - pd[(strips[si].y0 + gy - 1) * w + refCols[ri]];
          }
          stripGrads.push(g);
        }
        refGrads.push(stripGrads);
      }

      var minRef = refCols[0];
      for (var ri = 1; ri < refCols.length; ri++) {
        if (refCols[ri] < minRef) minRef = refCols[ri];
      }
      var maxX = minRef - 4;
      if (maxX < 0) return { deltaY: 0, confidence: 0 };

      var bestScore = Infinity;
      var bestCol = -1;
      var stripBail = BAIL_PER_PIXEL * sh;

      for (var xi = maxX; xi >= 0; xi--) {
        var totalScore = 0;
        var bailed = false;

      c.width = totalW; c.height = totalH;
      var cx = c.getContext('2d');

      for (var i = 0; i < images.length; i++) {
        if (!images[i]) continue;
        if (isVert) {
          if (offset + images[i].h > totalH) break;
          cx.drawImage(images[i].img, 0, offset);
          offset += images[i].h;

          if (offset + images[i].w > totalW) break;
          cx.drawImage(images[i].img, offset, 0);

    case 'FR_UPDATE':   return Object.assign({}, st, { fileReceive: Object.assign({}, st.fileReceive, a.v) });

    case 'BT_UPDATE':   return Object.assign({}, st, { blockText: Object.assign({}, st.blockText, a.v) });

function cropCanvas(srcCanvas, rect, direction) {
  // For scroll captures: crop only perpendicular to scroll direction
  // Vertical scroll → apply X/W only, full height
  // Horizontal scroll → apply Y/H only, full width
  var isVert = direction !== 'horizontal';
  var sx = isVert ? Math.round(srcCanvas.width * rect.x / 100) : 0;
  var sy = isVert ? 0 : Math.round(srcCanvas.height * rect.y / 100);
  var sw = isVert ? Math.max(1, Math.round(srcCanvas.width * rect.w / 100)) : srcCanvas.width;
  var sh = isVert ? srcCanvas.height : Math.max(1, Math.round(srcCanvas.height * rect.h / 100));
  var c = document.createElement('canvas');
  c.width = sw; c.height = sh;
  c.getContext('2d').drawImage(srcCanvas, sx, sy, sw, sh, 0, 0, sw, sh);
  return c;
}

function downloadCanvas(canvas, fmt, filename) {
  var mime = fmt === 'jpeg' ? 'image/jpeg' : 'image/png';
  var ext = fmt === 'jpeg' ? '.jpg' : '.png';
  canvas.toBlob(function(blob) {
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = filename + ext;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
  }, mime, fmt === 'jpeg' ? 0.92 : undefined);
}

function CropRectOverlay(props) {
  var rect = props.rect;
  if (!rect) return null;
  var dragRef = useRef({ type: null, sx: 0, sy: 0, sr: null, cw: 0, ch: 0 });
  var containerRef = useRef(null);

  function getVideoBounds() {
    var c = containerRef.current;
    var v = props.videoRef && props.videoRef.current;
    if (!c || !v || !v.videoWidth) return null;
    var cRect = c.getBoundingClientRect();
    var scale = Math.min(cRect.width / v.videoWidth, cRect.height / v.videoHeight);
    var dw = v.videoWidth * scale;
    var dh = v.videoHeight * scale;
    return { x: (cRect.width - dw) / 2, y: (cRect.height - dh) / 2, w: dw, h: dh };
  }

  var videoBoundsState = useState(null);
  var videoBounds = videoBoundsState[0];
  var setVideoBounds = videoBoundsState[1];

  useEffect(function() {
    function update() {
      var c = containerRef.current;
      var v = props.videoRef && props.videoRef.current;
      if (!c || !v || !v.videoWidth) { setVideoBounds(null); return; }
      var cRect = c.getBoundingClientRect();
      var scale = Math.min(cRect.width / v.videoWidth, cRect.height / v.videoHeight);
      var dw = v.videoWidth * scale;
      var dh = v.videoHeight * scale;
      setVideoBounds({ x: (cRect.width - dw) / 2, y: (cRect.height - dh) / 2, w: dw, h: dh });
    }
    update();
    var ro = new ResizeObserver(update);
    if (containerRef.current) ro.observe(containerRef.current);
    var v = props.videoRef && props.videoRef.current;
    if (v) v.addEventListener('loadedmetadata', update);
    return function() { ro.disconnect(); if (v) v.removeEventListener('loadedmetadata', update); };
  }, [props.videoRef]);

  function pct(px, total) { return (px / total) * 100; }

  function onDown(e, type) {
    e.preventDefault(); e.stopPropagation();
    var c = containerRef.current; if (!c) return;
    var vb = getVideoBounds();
    var dragCw, dragCh;
    if (vb) { dragCw = vb.w; dragCh = vb.h; }
    else { var b = c.getBoundingClientRect(); dragCw = b.width; dragCh = b.height; }
    dragRef.current = { type: type, sx: e.clientX, sy: e.clientY, sr: Object.assign({}, rect), cw: dragCw, ch: dragCh };
    function onMove(ev) {
      var d = dragRef.current; if (!d.type) return;
      var dx = pct(ev.clientX - d.sx, d.cw);
      var dy = pct(ev.clientY - d.sy, d.ch);
      var r = Object.assign({}, d.sr);
      if (d.type === 'move') {
        r.x = Math.max(0, Math.min(100 - r.w, d.sr.x + dx));
        r.y = Math.max(0, Math.min(100 - r.h, d.sr.y + dy));
      } else {
        if (d.type.indexOf('w') >= 0) { var nx = d.sr.x + dx, nw = d.sr.w - dx; if (nw >= 5 && nx >= 0) { r.x = nx; r.w = nw; } }
        if (d.type.indexOf('e') >= 0) { var nw2 = d.sr.w + dx; if (nw2 >= 5 && d.sr.x + nw2 <= 100) r.w = nw2; }
        if (d.type.indexOf('n') >= 0) { var ny = d.sr.y + dy, nh = d.sr.h - dy; if (nh >= 5 && ny >= 0) { r.y = ny; r.h = nh; } }
        if (d.type.indexOf('s') >= 0) { var nh2 = d.sr.h + dy; if (nh2 >= 5 && d.sr.y + nh2 <= 100) r.h = nh2; }
      }
      if (props.onChange) props.onChange(r);
    }
    function onUp() {
      dragRef.current.type = null;
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    }
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  }

  var hs = 10; // handle size px
  var ho = -5; // handle offset
  var hCls = 'absolute bg-blue-400 rounded-full z-20';
  var hBase = { width: hs + 'px', height: hs + 'px' };
  function hStyle(pos) { return Object.assign({}, hBase, pos); }

  var cropStyle;
  if (videoBounds) {
    cropStyle = {
      left: (videoBounds.x + rect.x / 100 * videoBounds.w) + 'px',
      top: (videoBounds.y + rect.y / 100 * videoBounds.h) + 'px',
      width: (rect.w / 100 * videoBounds.w) + 'px',
      height: (rect.h / 100 * videoBounds.h) + 'px',
      cursor: 'move'
    };
  } else {
    cropStyle = { left: rect.x + '%', top: rect.y + '%', width: rect.w + '%', height: rect.h + '%', cursor: 'move' };
  }

  return h('div', { ref: containerRef, className: 'absolute inset-0 z-10' },
    h('div', {
      className: 'absolute border-2 border-dashed border-blue-400 bg-blue-400/10',
      style: cropStyle,
      onMouseDown: function(e) { onDown(e, 'move'); },
    },
      h('div', { className: 'absolute -top-5 left-0 text-[10px] font-mono text-blue-400 bg-zinc-900/80 px-1 rounded pointer-events-none select-none' }, 'OCR \uC601\uC5ED'),
      h('div', { className: hCls, style: hStyle({ top: ho + 'px', left: ho + 'px', cursor: 'nw-resize' }), onMouseDown: function(e) { onDown(e, 'nw'); } }),
      h('div', { className: hCls, style: hStyle({ top: ho + 'px', right: ho + 'px', cursor: 'ne-resize' }), onMouseDown: function(e) { onDown(e, 'ne'); } }),
      h('div', { className: hCls, style: hStyle({ bottom: ho + 'px', left: ho + 'px', cursor: 'sw-resize' }), onMouseDown: function(e) { onDown(e, 'sw'); } }),
      h('div', { className: hCls, style: hStyle({ bottom: ho + 'px', right: ho + 'px', cursor: 'se-resize' }), onMouseDown: function(e) { onDown(e, 'se'); } }),
      h('div', { className: hCls, style: hStyle({ top: ho + 'px', left: '50%', marginLeft: ho + 'px', cursor: 'n-resize' }), onMouseDown: function(e) { onDown(e, 'n'); } }),
      h('div', { className: hCls, style: hStyle({ bottom: ho + 'px', left: '50%', marginLeft: ho + 'px', cursor: 's-resize' }), onMouseDown: function(e) { onDown(e, 's'); } }),
      h('div', { className: hCls, style: hStyle({ top: '50%', left: ho + 'px', marginTop: ho + 'px', cursor: 'w-resize' }), onMouseDown: function(e) { onDown(e, 'w'); } }),
      h('div', { className: hCls, style: hStyle({ top: '50%', right: ho + 'px', marginTop: ho + 'px', cursor: 'e-resize' }), onMouseDown: function(e) { onDown(e, 'e'); } })

function FileReceiveMain(props) {
  var st = props.state;

  var SCRIPTS = {
    full: [
      "$b=[IO.File]::ReadAllBytes($args[0])",
      "$n=[Text.Encoding]::UTF8.GetBytes((Split-Path $args[0] -Leaf))",
      "$b=@([byte]$n.Length)+$n+$b",
      "$d=[Convert]::ToBase64String($b)",
      '$h=@"',
      '<canvas id=c style="width:100vw;height:100vh;image-rendering:pixelated;display:block">',
      '</canvas><script>',
      "var d=atob('$d'),w=96,h=54,hp=32,dp=w*h-hp,B=dp/4|0,",
      'T=Math.ceil(d.length/B),f=0,hi=0,',
      "c=document.getElementById('c'),x;c.width=w;c.height=h;",
      "x=c.getContext('2d');document.body.style='margin:0;overflow:hidden';",
      "var P=['#000','#00f','#f00','#fff'];",
      'function enc(v,pos){for(var j=0;j<4;j++){var k=pos+j;',
      "x.fillStyle=P[v>>6-j*2&3];x.fillRect(k%w,k/w|0,1,1)}}",
      'setInterval(function(){',
      'x.fillStyle=\'#000\';x.fillRect(0,0,w,h);',
      'enc(0x53,0);enc(0x43,4);enc(f>>8&0xFF,8);enc(f&0xFF,12);',
      'enc(T>>8&0xFF,16);enc(T&0xFF,20);enc(hi>>8&0xFF,24);enc(hi&0xFF,28);',
      'var o=f*B;',
      'for(var i=0;i<B&&o+i<d.length;i++){var v=d.charCodeAt(o+i);',
      "enc(v,hp+i*4)}",
      "f=(f+1)%T},500)</" + "script>",
      '"@',
      '$h|Out-File $env:TEMP\\t.html -Enc utf8',
      'Start-Process $env:TEMP\\t.html',
    ],
    winforms: [
      'Add-Type -A System.Windows.Forms,System.Drawing',
      '$d=[IO.File]::ReadAllBytes($args[0])',
      '$fn=[Text.Encoding]::UTF8.GetBytes((Split-Path $args[0] -Leaf))',
      '$d=@([byte]$fn.Length)+$fn+$d',
      '$w=96;$h=54;$N=$w*$h/4;$T=[math]::Ceiling($d.Length/$N);$n=0',
      '$P=[Drawing.Color]::Black,[Drawing.Color]::Blue,',
      '[Drawing.Color]::Red,[Drawing.Color]::White',
      '$b=New-Object Drawing.Bitmap $w,$h',
      '$f=New-Object Windows.Forms.Form',
      '$f.WindowState=2;$f.FormBorderStyle=0',
      '$p=New-Object Windows.Forms.PictureBox',
      '$p.Dock=5;$p.SizeMode=1;$p.Image=$b',
      '$f.Controls.Add($p)',
      '$t=New-Object Windows.Forms.Timer',
      '$t.Interval=500',
      '$t.Add_Tick({',
      '$g=[Drawing.Graphics]::FromImage($b);$g.Clear([Drawing.Color]::Black);$g.Dispose()',
      '$o=$script:n*$N',
      'for($i=0;$i -lt $N -and $o+$i -lt $d.Length;$i++){',
      '$v=$d[$o+$i]',
      'for($j=0;$j -lt 4;$j++){$k=$i*4+$j',
      '$b.SetPixel($k%$w,[math]::Floor($k/$w),',
      '$P[$v-shr(6-$j*2)-band 3])}}',
      '$p.Refresh();$f.Text="$($script:n+1)/$T"',
      '$script:n=($script:n+1)%$T})',
      '$t.Start()',
      '[Windows.Forms.Application]::Run($f)',

  };

  var EXEC_CMD = {
    full: 'powershell -ep bypass -f $env:TEMP\\t.ps1 C:\\path\\to\\file.pptx',

        h('p', { className: 'text-xs text-zinc-500' }, '신호 감지 시 자동으로 진행합니다.')
      )
    );
  }

  // --- CALIBRATE phase ---
  if (st.phase === 'CALIBRATE') {
    var pal = st.palette || VisualDecoder.DEFAULT_PALETTE;
    return h('div', { className: 'flex-1 flex flex-col' },
      h('div', { className: 'flex-1 relative min-h-0' },
        h(VideoPreview, {
          stream: props.stream,
          resolution: props.resolution,
          fps: props.fps,
          videoRef: props.videoRef,
        }),
        h('div', { className: 'absolute inset-0 pointer-events-none' },
          // Grid overlay border
          h('div', { className: 'absolute inset-4 border-2 border-blue-400/60 rounded-lg' })
        ),
        h('div', { className: 'absolute inset-0 flex items-center justify-center pointer-events-none' },
          h('div', { className: 'bg-zinc-900/80 backdrop-blur rounded-xl p-6 text-center' },
            h(IGrid, { size: 32, className: 'text-blue-400 mx-auto mb-3' }),
            h('p', { className: 'text-sm text-zinc-200 font-medium mb-1' },
              st.calibrationStep === 1 ? '격자 감지됨' : '색상 학습 중...'
            ),
            h('p', { className: 'text-xs text-zinc-500' },
              st.calibrationStep === 1 ? '96×54 격자, 블록 20px' : '프레임 수집: ' + st.totalProcessed + '/20'
            )
          )
        )
      ),
      h('div', { className: 'px-4 py-2 bg-zinc-800/50 text-center' },
        h('p', { className: 'text-xs text-zinc-500' }, '색상 팔레트 학습 중 (' + st.totalProcessed + '/20 프레임)')
      )
    );
  }

  // --- RECEIVING phase ---
  if (st.phase === 'RECEIVING') {
    var pct = st.totalFrames > 0 ? Math.round(st.collectedCount / st.totalFrames * 100) : 0;
    var barClass = pct >= 90 ? 'bg-emerald-500' : 'bg-blue-500';
    var rateColor = st.validRate >= 80 ? 'text-zinc-100' : st.validRate >= 60 ? 'text-amber-400' : 'text-red-400';

    // Frame map cells
    var gridCols = Math.min(st.totalFrames, 20);
    var cellSize = st.totalFrames <= 100 ? 16 : st.totalFrames <= 500 ? 10 : 6;
    var frameCells = [];
    for (var i = 0; i < st.totalFrames; i++) {
      var cellCls = st.framesMap && st.framesMap[i]
        ? 'bg-emerald-500' : (i === st.lastFrameNum ? 'bg-blue-500 animate-pulse' : 'bg-zinc-700');
      frameCells.push(
        h('div', {
          key: i,
          className: cellCls + ' rounded-sm',
          style: { width: cellSize + 'px', height: cellSize + 'px' },
          title: '프레임 #' + i + (st.framesMap && st.framesMap[i] ? ' ✓' : ''),
        })
      );
    }

    return h('div', { className: 'flex-1 flex flex-col' },
      // Video area (40%)
      h('div', { className: 'relative', style: { height: '40%' } },
        h(VideoPreview, {
          stream: props.stream,
          resolution: props.resolution,
          fps: props.fps,
          videoRef: props.videoRef,
        }),
        h('div', { className: 'absolute top-2 right-3 text-sm font-mono text-white bg-black/60 px-2 py-1 rounded' },
          'F' + (st.lastFrameNum >= 0 ? st.lastFrameNum + 1 : '-') + '/' + st.totalFrames
        )
      ),
      // Frame map (60%)
      h('div', { className: 'flex-1 bg-zinc-800 border-t border-zinc-700 p-4 overflow-y-auto' },
        h('div', { className: 'text-xs text-zinc-500 mb-2' }, '프레임 수집 현황:'),
        h('div', {
          className: 'flex flex-wrap gap-px',
          style: { maxWidth: (gridCols * (cellSize + 1)) + 'px' },
        }, frameCells),
        h('div', { className: 'flex items-center gap-3 mt-3 text-xs text-zinc-500' },
          h('span', { className: 'flex items-center gap-1' },
            h('span', { className: 'inline-block w-2 h-2 bg-emerald-500 rounded-sm' }), '수집 완료'
          ),
          h('span', { className: 'flex items-center gap-1' },
            h('span', { className: 'inline-block w-2 h-2 bg-zinc-700 rounded-sm' }), '미수집'
          ),
          h('span', { className: 'flex items-center gap-1' },
            h('span', { className: 'inline-block w-2 h-2 bg-blue-500 rounded-sm' }), '현재'
          )
        )
      )
    );
  }

  // --- COMPLETE phase ---
  if (st.phase === 'COMPLETE') {
    var sizeStr = st.fileSizeKB >= 1024
      ? (st.fileSizeKB / 1024).toFixed(1) + ' MB'
      : st.fileSizeKB.toFixed(1) + ' KB';

    return h('div', { className: 'flex-1 flex flex-col items-center justify-center gap-4 p-8' },
      h('div', { className: 'text-emerald-400 mb-2', style: { animation: 'pulse-dot 0.4s ease' } },
        h('svg', { xmlns: 'http://www.w3.org/2000/svg', width: 64, height: 64, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round' },
          h('path', { d: 'M22 11.08V12a10 10 0 1 1-5.93-9.14' }),
          h('polyline', { points: '22 4 12 14.01 9 11.01' })
        )
      ),
      h('h2', { className: 'text-xl font-semibold text-zinc-100' }, '파일 수신 완료'),
      st.fileName ? h('p', { className: 'text-lg font-mono text-zinc-300 mt-1' }, st.fileName) : null,
      h('p', { className: 'text-2xl font-bold font-mono text-zinc-200' }, sizeStr),
      h('p', { className: 'text-sm text-zinc-400 mt-2' }, '소스 PC에서 스크립트를 종료해 주세요.'),
      h('p', { className: 'text-xs text-zinc-500' }, '(브라우저 탭 닫기 또는 Ctrl+C)'),
    );
  }

  return h(Placeholder, { icon: IDownload, title: '파일 수신', desc: '상태: ' + st.phase });
}

      )
    );
  }

  return null;

var SIDEBAR_MIN = 180;
var SIDEBAR_MAX = 480;
var SIDEBAR_DEFAULT = 280;

function SidebarResizeHandle(props) {
  var dragging = useRef(false);
  var startX = useRef(0);
  var startW = useRef(0);

  function onMouseDown(e) {
    e.preventDefault();
    dragging.current = true;
    startX.current = e.clientX;
    startW.current = props.width;
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    document.addEventListener('mousemove', onMouseMove);
    document.addEventListener('mouseup', onMouseUp);
  }

  function onMouseMove(e) {
    if (!dragging.current) return;
    var w = startW.current + (e.clientX - startX.current);
    props.onChange(Math.max(SIDEBAR_MIN, Math.min(SIDEBAR_MAX, w)));
  }

  function onMouseUp() {
    dragging.current = false;
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    document.removeEventListener('mousemove', onMouseMove);
    document.removeEventListener('mouseup', onMouseUp);
    if (props.onCommit) props.onCommit();
  }

  return h('div', {
    className: 'w-1 cursor-col-resize hover:bg-blue-500/50 active:bg-blue-500 transition-colors flex-shrink-0 relative group',
    onMouseDown: onMouseDown,
    role: 'separator',
    'aria-orientation': 'vertical',
    'aria-label': '\uC0AC\uC774\uB4DC\uBC14 \uD06C\uAE30 \uC870\uC808',
  },
    h('div', { className: 'absolute inset-y-0 -left-1 -right-1 group-hover:bg-blue-500/20' })

}

  function captureFrame() {

    if (!video || video.readyState < 2) return;

    // Static frame detection
    var lastGray = cap.lastSeenGray || cap.anchorGray;
    if (lastGray) {
      var _sd = currGray.data, _pd = lastGray.data;
      var _sLen = Math.min(_sd.length, _pd.length);
      var _step = Math.max(1, (_sLen / 200) | 0);
      var _diff = 0, _sn = 0;
      for (var _si = 0; _si < _sLen; _si += _step) { _diff += Math.abs(_sd[_si] - _pd[_si]); _sn++; }
      if (_sn > 0 && _diff / _sn < 2) return;
    }

    // Non-static frame — only segments array holds kept frames
    cap.frameCount++;
    var fNum = cap.frameCount - 1;

    // Check overlap with anchor
    var result = CaptureEngine.rowMatch(cap.anchorGray, currGray, direction, 0);
    console.log('[ScrollSnap] f=' + fNum + ' anchor=' + cap.anchorFrameNum + ' dY=' + result.deltaY + ' c=' + result.confidence.toFixed(3) + (result.reason && result.reason !== 'ok' ? ' reason=' + result.reason : '') + (result.refRowCount ? ' refs=' + result.refRowCount : ''));

    // False match detection:
    //  1. deltaY must be >= 20 (tiny dY=4 is systematic false match from fixed bottom UI)
    //  2. deltaY must grow between non-static frames (stale dY = repeating pattern match)
    //  3. deltaY must stay < 85% of frame height (preserve enough overlap for stitching)
    var deltaGrew = result.deltaY > cap.lastAnchorDeltaY + 3;
    var isValidOverlap = result.deltaY >= 20 && result.confidence >= 0.3 && deltaGrew;
    var maxDeltaY = Math.floor(cap.frameHeight * 0.50);

    if (isValidOverlap) {
      cap.consecutiveRejects = 0;
      cap.prevFrameRejects = 0;
      if (result.deltaY >= maxDeltaY && cap.prevFrameImgData) {
        // Overlap valid but too large — proactive segment break to preserve stitching overlap
        var overlap = cap.frameHeight - cap.lastAnchorDeltaY;
        mergeIntoAcc(cap, cap.prevFrameImgData, overlap, cap.prevFrameNum, direction);
        cap.anchorGray = cap.prevFrameGray;
        cap.anchorFrameNum = fNum - 1;
        cap.prevFrameGray = null;
        cap.prevFrameImgData = null;
        cap.lastAnchorDeltaY = 0;
        cap.segmentCount++;
        console.log('[ScrollSnap] Seg ' + cap.segmentCount + ' max-overlap break at f=' + fNum + ' dY=' + result.deltaY + ' max=' + maxDeltaY + ' newAnchor=' + cap.anchorFrameNum);
        dispatch({ type: 'SC_UPDATE', v: {
          frameCount: cap.frameCount,
          matchQuality: 0,
          segmentCount: cap.segmentCount,
        }});
      } else {
        // Normal valid overlap — update prevFrame
        cap.lastAnchorDeltaY = result.deltaY;
        cap.prevFrameGray = currGray;
        cap.prevFrameImgData = imgData;
        cap.prevFrameNum = fNum;
        dispatch({ type: 'SC_UPDATE', v: {
          frameCount: cap.frameCount,
          matchQuality: result.confidence,
          segmentCount: cap.segmentCount,
        }});
      }
    } else if (result.deltaY >= 20 && result.confidence >= 0.3 && !deltaGrew) {
      // Valid match but scroll didn't advance — skip silently, don't count as reject
      cap.prevFrameRejects = 0;
      cap.consecutiveRejects = 0;
      console.log('[ScrollSnap] f=' + fNum + ' scroll paused (dY=' + result.deltaY + ' same as prev), skip');
    } else {
      if (cap.prevFrameImgData) {
        cap.prevFrameRejects = (cap.prevFrameRejects || 0) + 1;
        if (cap.prevFrameRejects >= 3) {
          // 3 consecutive failures — segment break, prevFrame becomes new anchor
          cap.prevFrameRejects = 0;
          cap.consecutiveRejects = 0;
          var overlap = cap.frameHeight - cap.lastAnchorDeltaY;
          mergeIntoAcc(cap, cap.prevFrameImgData, overlap, cap.prevFrameNum, direction);
          cap.anchorGray = cap.prevFrameGray;
          cap.anchorFrameNum = cap.prevFrameNum;
          cap.prevFrameGray = null;
          cap.prevFrameImgData = null;
          cap.lastAnchorDeltaY = 0;
          cap.segmentCount++;
          console.log('[ScrollSnap] Seg ' + cap.segmentCount + ' break at f=' + fNum + ' (after 3 rejects) newAnchor=' + cap.anchorFrameNum);
          dispatch({ type: 'SC_UPDATE', v: {
            frameCount: cap.frameCount,
            matchQuality: 0,
            segmentCount: cap.segmentCount,
          }});
        } else {
          console.log('[ScrollSnap] f=' + fNum + ' prevFrame reject (' + cap.prevFrameRejects + '/3), keeping anchor=' + cap.anchorFrameNum);
        }
      } else {
        // No prevFrame — check for stale anchor recovery
        cap.consecutiveRejects++;
        if (cap.consecutiveRejects >= 10) {
          // Anchor is stale — force current frame as new anchor
          mergeIntoAcc(cap, imgData, 0, fNum, direction);
          cap.anchorGray = currGray;
          cap.anchorFrameNum = fNum;
          cap.prevFrameGray = null;
          cap.prevFrameImgData = null;
          cap.lastAnchorDeltaY = 0;
          cap.consecutiveRejects = 0;
          cap.segmentCount++;
          console.log('[ScrollSnap] Seg ' + cap.segmentCount + ' stale-anchor recovery at f=' + fNum);
          dispatch({ type: 'SC_UPDATE', v: {
            frameCount: cap.frameCount,
            matchQuality: 0,
            segmentCount: cap.segmentCount,
          }});
        } else {
          console.log('[ScrollSnap] f=' + fNum + ' rejected (' + cap.consecutiveRejects + '/10), keeping anchor=' + cap.anchorFrameNum);
        }
      }
    }

    // Update lastSeenGray for static detection (every non-static frame)
    cap.lastSeenGray = currGray;

    // Memory check — accumulated image + current prevFrame
    var memBytes = cap.accData ? cap.accData.data.length : 0;
    if (cap.prevFrameImgData) memBytes += cap.prevFrameImgData.data.length;
    var memMB = Math.round(memBytes / (1024 * 1024));
    dispatch({ type: 'SC_UPDATE', v: { memoryMB: memMB } });

    if (memMB >= cap.MEMORY_AUTO_STOP || cap.frameCount >= cap.MAX_FRAMES) {
      stopCapture();
    }
  }

  function startCapture() {
    var cap = captureRef.current;
    cap.active = true;
    cap.canvas = null;
    cap.ctx = null;
    cap.anchorGray = null;
    cap.prevFrameGray = null;
    cap.prevFrameImgData = null;
    cap.prevFrameNum = -1;
    cap.lastSeenGray = null;
    cap.accData = null;
    cap.seamInfos = [];
    cap.firstFrameNum = 0;
    cap.anchorFrameNum = -1;
    cap.consecutiveRejects = 0;
    cap.prevFrameRejects = 0;
    cap.lastAnchorDeltaY = 0;
    cap.frameCount = 0;
    cap.segmentCount = 0;
    cap.frameHeight = 0;
    cap.startTime = Date.now();
    cap.cropApplied = false;

    dispatch({ type: 'SC_UPDATE', v: {
      phase: 'CAPTURING',
      elapsedSec: 0,
      frameCount: 0,
      matchQuality: 0,
      consecutiveFails: 0,
      memoryMB: 0,
      chainLength: 0,
      excludedFrames: 0,
      segmentCount: 0,
      assembleProgress: 0,
      resultCanvas: null,
    }});

    setTimeout(function() {
      var el = videoRef.current;
      if (el && streamRef.current) {
        el.srcObject = streamRef.current;
      }
    }, 50);

    cap.timerId = setInterval(function() {
      if (!cap.active) return;
      var elapsed = Math.floor((Date.now() - cap.startTime) / 1000);
      dispatch({ type: 'SC_UPDATE', v: { elapsedSec: elapsed } });
    }, 1000);

    cap.sampleIntervalId = setInterval(function() {
      captureFrame();
    }, 100);
  }

  function stopCapture() {
    var cap = captureRef.current;
    cap.active = false;
    if (cap.timerId) { clearInterval(cap.timerId); cap.timerId = null; }
    if (cap.sampleIntervalId) { clearInterval(cap.sampleIntervalId); cap.sampleIntervalId = null; }

    // Merge last prevFrame into accumulator
    if (cap.prevFrameImgData) {
      var direction = state.scrollCapture.direction;
      var overlap = cap.frameHeight > 0 ? cap.frameHeight - cap.lastAnchorDeltaY : 0;
      mergeIntoAcc(cap, cap.prevFrameImgData, overlap, cap.prevFrameNum, direction);
      cap.prevFrameImgData = null;
    }

    var direction = state.scrollCapture.direction;
    var isVert = direction !== 'horizontal';

    console.log('[ScrollSnap] Stop: ' + cap.frameCount + ' frames, ' + (cap.segmentCount + 1) + ' segments');

    dispatch({ type: 'SC_UPDATE', v: { phase: 'ASSEMBLING', assembleProgress: 0 } });

    if (!cap.accData) {
      dispatch({ type: 'SC_UPDATE', v: { phase: 'READY' } });
      return;
    }

    // Create final canvas from accumulated merged image
    var canvasW = cap.accData.width;
    var canvasH = cap.accData.height;
    if (canvasW > 32000) canvasW = 32000;
    if (canvasH > 32000) canvasH = 32000;

    var finalCanvas = document.createElement('canvas');
    finalCanvas.width = canvasW;
    finalCanvas.height = canvasH;
    var fCtx = finalCanvas.getContext('2d');
    fCtx.putImageData(cap.accData, 0, 0);


    var pngKB = Math.round(canvasW * canvasH * 0.3 / 1024);
    var jpegKB = Math.round(pngKB * 0.4);

    dispatch({ type: 'SC_UPDATE', v: {
      phase: 'RESULT',
      resultCanvas: finalCanvas,
      resultWidth: canvasW,
      resultHeight: canvasH,
      chainLength: cap.frameCount,
      excludedFrames: cap.frameCount - cap.segmentCount - 1,
      segmentCount: cap.segmentCount,
      assembleProgress: 100,
      pngSizeKB: pngKB,
      jpegSizeKB: jpegKB,
    }});

    cap.accData = null;
    cap.seamInfos = [];
    cap.anchorGray = null;
    cap.prevFrameGray = null;
    cap.lastSeenGray = null;
  }

  function cancelAssemble() {
    dispatch({ type: 'SC_UPDATE', v: { phase: 'READY', assembleProgress: 0 } });
  }

  // --- File Receive Pipeline ---
  var receiveRef = useRef({
    active: false, phase: 'SETUP', canvas: null, ctx: null, gridBounds: null,
    palette: VisualDecoder.DEFAULT_PALETTE.slice(),
    framesMap: {}, totalFrames: 0, fileHash: 0,
    consecutiveMagic: 0, calibrationSamples: [], calibrationFrames: 0,
    totalProcessed: 0, totalValid: 0, collectedCount: 0, loopCount: 0,
    startTime: 0, timerId: null, sampleIntervalId: null,
    lastFrameNum: -1, prevFrameNum: -1, speedHistory: [],
  });

  function processReceiveFrame() {
    var rcv = receiveRef.current;
    var video = videoRef.current;
    console.log('[FR]', 'active=' + rcv.active, 'video=' + (video ? 'yes(rs=' + video.readyState + ')' : 'NULL'), 'phase=' + rcv.phase);
    if (!rcv.active) return;
    if (!video || video.readyState < 2) return;

    if (!rcv.canvas) {
      rcv.canvas = document.createElement('canvas');
      rcv.canvas.width = video.videoWidth;
      rcv.canvas.height = video.videoHeight;
      rcv.ctx = rcv.canvas.getContext('2d', { willReadFrequently: true });
    }

    var w = rcv.canvas.width;
    var h2 = rcv.canvas.height;
    rcv.ctx.drawImage(video, 0, 0, w, h2);
    var imgData = rcv.ctx.getImageData(0, 0, w, h2);
    var fr = { phase: rcv.phase };

    // STANDBY: detect grid bounds + scan for magic bytes
    if (fr.phase === 'STANDBY') {
      // Auto-detect grid position on each frame until found
      if (!rcv.gridBounds) {
        rcv.gridBounds = VisualDecoder.detectGridBounds(imgData);
        if (rcv.gridBounds) { console.log('[FR] Grid detected:', JSON.stringify(rcv.gridBounds)); }
      }
      var result = VisualDecoder.decodeFrame(imgData, rcv.palette, rcv.gridBounds);
      if (result) { console.log('[FR] header:', JSON.stringify(result.header)); }
      if (result && VisualDecoder.isValidHeader(result.header)) {
        rcv.consecutiveMagic++;
        dispatch({ type: 'FR_UPDATE', v: { consecutiveMagic: rcv.consecutiveMagic } });
        if (rcv.consecutiveMagic >= 3) {
          rcv.consecutiveMagic = 0;
          rcv.calibrationSamples = [];
          rcv.calibrationFrames = 0;
          rcv.phase = 'CALIBRATE';
          dispatch({ type: 'FR_UPDATE', v: { phase: 'CALIBRATE', calibrationStep: 1, consecutiveMagic: 0, totalProcessed: 0 } });
        }
      } else {
        rcv.consecutiveMagic = 0;
        dispatch({ type: 'FR_UPDATE', v: { consecutiveMagic: 0 } });
      }
      return;
    }

    // CALIBRATE: collect samples for K-means
    if (fr.phase === 'CALIBRATE') {
      var calResult = VisualDecoder.decodeFrame(imgData, rcv.palette, rcv.gridBounds);
      if (calResult) {
        for (var ci = 0; ci < calResult.rawRGBs.length; ci++) {
          rcv.calibrationSamples.push(calResult.rawRGBs[ci]);
        }
        rcv.calibrationFrames++;
        dispatch({ type: 'FR_UPDATE', v: { totalProcessed: rcv.calibrationFrames, calibrationStep: 1 } });
        if (rcv.calibrationFrames >= 10) {
          var learned = VisualDecoder.kmeansCalibrate(rcv.calibrationSamples);
          if (learned) {
            rcv.palette = learned;
            dispatch({ type: 'FR_UPDATE', v: { palette: learned, calibrationStep: 2 } });
          }
          var checkResult = VisualDecoder.decodeFrame(imgData, rcv.palette, rcv.gridBounds);
          if (checkResult && VisualDecoder.isValidHeader(checkResult.header)) {
            rcv.totalFrames = checkResult.header.totalFrames;
            rcv.fileHash = checkResult.header.fileHash;
            rcv.totalProcessed = 0; rcv.totalValid = 0; rcv.collectedCount = 0;
            rcv.loopCount = 1; rcv.prevFrameNum = -1; rcv.lastFrameNum = -1;
            rcv.speedHistory = []; rcv.framesMap = {};
            rcv.phase = 'RECEIVING';
            dispatch({ type: 'FR_UPDATE', v: {
              phase: 'RECEIVING', totalFrames: rcv.totalFrames,
              collectedCount: 0, loopCount: 1, totalProcessed: 0, totalValid: 0,
              validRate: 0, speedKBs: 0, framesMap: {}, lastFrameNum: -1,
            } });
            if (!rcv.framesMap[checkResult.header.frameNum]) {
              rcv.framesMap[checkResult.header.frameNum] = [checkResult.data];
              rcv.collectedCount = 1; rcv.totalValid = 1;
              dispatch({ type: 'FR_UPDATE', v: { collectedCount: 1, totalValid: 1, lastFrameNum: checkResult.header.frameNum, framesMap: Object.assign({}, rcv.framesMap) } });
              if (rcv.collectedCount >= rcv.totalFrames && rcv.loopCount >= 2) { completeReceive(); return; }
            }
          } else {
            rcv.calibrationFrames = 5;
          }
        }
      }
      return;
    }

    // RECEIVING: decode and accumulate
    if (fr.phase === 'RECEIVING') {
      var decResult = VisualDecoder.decodeFrame(imgData, rcv.palette, rcv.gridBounds);
      rcv.totalProcessed++;
      if (decResult && VisualDecoder.isValidHeader(decResult.header) &&
          decResult.header.totalFrames === rcv.totalFrames &&
          decResult.header.fileHash === rcv.fileHash) {
        rcv.totalValid++;
        rcv.lastFrameNum = decResult.header.frameNum;
        if (rcv.prevFrameNum >= 0 && decResult.header.frameNum < rcv.prevFrameNum) {
          rcv.loopCount++;
        }
        rcv.prevFrameNum = decResult.header.frameNum;
        if (!rcv.framesMap[decResult.header.frameNum]) {
          rcv.framesMap[decResult.header.frameNum] = [decResult.data];
          rcv.collectedCount++;
          var now = Date.now();
          rcv.speedHistory.push({ t: now, bytes: VisualDecoder.BYTES_PER_FRAME });
          var cutoff = now - 5000;
          rcv.speedHistory = rcv.speedHistory.filter(function(e) { return e.t >= cutoff; });
          var totB = 0;
          for (var si = 0; si < rcv.speedHistory.length; si++) totB += rcv.speedHistory[si].bytes;
          var spElapsed = rcv.speedHistory.length > 1 ? (now - rcv.speedHistory[0].t) / 1000 : 1;
          var speedKBs = spElapsed > 0 ? (totB / 1024 / spElapsed) : 0;
          var vr = rcv.totalProcessed > 0 ? Math.round(rcv.totalValid / rcv.totalProcessed * 100) : 0;
          dispatch({ type: 'FR_UPDATE', v: {
            collectedCount: rcv.collectedCount, loopCount: rcv.loopCount,
            totalProcessed: rcv.totalProcessed, totalValid: rcv.totalValid,
            validRate: vr, speedKBs: speedKBs,
            lastFrameNum: decResult.header.frameNum,
            framesMap: Object.assign({}, rcv.framesMap),
          } });
          // Complete only after all frames collected AND minimum 2 loops for voting accuracy
          if (rcv.collectedCount >= rcv.totalFrames && rcv.loopCount >= 2) { completeReceive(); }
        } else {
          // Additional decode of already-seen frame — store for majority voting
          rcv.framesMap[decResult.header.frameNum].push(decResult.data);
          var vr2 = rcv.totalProcessed > 0 ? Math.round(rcv.totalValid / rcv.totalProcessed * 100) : 0;
          dispatch({ type: 'FR_UPDATE', v: {
            totalProcessed: rcv.totalProcessed, totalValid: rcv.totalValid,
            validRate: vr2, loopCount: rcv.loopCount, lastFrameNum: decResult.header.frameNum,
          } });
          // Check completion on loop boundary (all frames seen + 2 loops done)
          if (rcv.collectedCount >= rcv.totalFrames && rcv.loopCount >= 2) { completeReceive(); }
        }
      } else {
        var vr3 = rcv.totalProcessed > 0 ? Math.round(rcv.totalValid / rcv.totalProcessed * 100) : 0;
        dispatch({ type: 'FR_UPDATE', v: { totalProcessed: rcv.totalProcessed, validRate: vr3 } });
      }
    }
  }

  function completeReceive() {
    var rcv = receiveRef.current;
    rcv.active = false;
    if (rcv.timerId) { clearInterval(rcv.timerId); rcv.timerId = null; }
    if (rcv.sampleIntervalId) { clearInterval(rcv.sampleIntervalId); rcv.sampleIntervalId = null; }
    var rawData = VisualDecoder.reconstructFile(rcv.framesMap, rcv.totalFrames);
    if (!rawData) {
      dispatch({ type: 'FR_UPDATE', v: { errorMsg: 'File reconstruction failed' } });
      return;
    }
    // Parse filename header: [1 byte length N][N bytes filename UTF-8][file data]
    var fileName = null;
    var fileData = rawData;
    if (rawData.length > 1) {
      var fnLen = rawData[0];
      if (fnLen > 0 && fnLen < 200 && rawData.length > 1 + fnLen) {
        try {
          fileName = new TextDecoder().decode(rawData.slice(1, 1 + fnLen));
          fileData = rawData.slice(1 + fnLen);
        } catch(e) { /* fallback: treat entire data as file */ }
      }
    }
    var fileSizeKB = fileData.length / 1024;
    rcv.phase = 'COMPLETE';
    dispatch({ type: 'FR_UPDATE', v: {
      phase: 'COMPLETE', fileData: fileData, fileName: fileName, fileSizeKB: fileSizeKB,
    } });
  }

  function startReceive() {
    var rcv = receiveRef.current;
    rcv.active = true; rcv.canvas = null; rcv.ctx = null; rcv.gridBounds = null;
    rcv.palette = VisualDecoder.DEFAULT_PALETTE.slice();
    rcv.framesMap = {}; rcv.totalFrames = 0; rcv.fileHash = 0;
    rcv.consecutiveMagic = 0; rcv.calibrationSamples = []; rcv.calibrationFrames = 0;
    rcv.totalProcessed = 0; rcv.totalValid = 0; rcv.collectedCount = 0;
    rcv.loopCount = 0; rcv.startTime = Date.now();
    rcv.lastFrameNum = -1; rcv.prevFrameNum = -1; rcv.speedHistory = [];
    rcv.phase = 'STANDBY';
    dispatch({ type: 'FR_UPDATE', v: {
      phase: 'STANDBY', totalFrames: 0, collectedCount: 0, framesMap: {},
      loopCount: 0, elapsedSec: 0, validRate: 0, speedKBs: 0,
      calibrationStep: 0, palette: null, fileData: null, fileName: null,
      fileSizeKB: 0, consecutiveMagic: 0, totalProcessed: 0, totalValid: 0,
      lastFrameNum: -1, errorMsg: null,
    } });
    setTimeout(function() {

      if (el && streamRef.current) { el.srcObject = streamRef.current; }

  }

  function downloadReceivedFile() {

    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');

  function newReceive() {
    dispatch({ type: 'FR_UPDATE', v: {
      phase: 'SETUP', totalFrames: 0, collectedCount: 0, framesMap: {},
      loopCount: 0, elapsedSec: 0, validRate: 0, speedKBs: 0,
      calibrationStep: 0, palette: null, fileData: null, fileName: null,
      fileSizeKB: 0, consecutiveMagic: 0, totalProcessed: 0, totalValid: 0,
      lastFrameNum: -1, errorMsg: null,

  }

  // --- SC OCR Pipeline ---
  var ocrCancelledRef = useRef(false);

  function scStartOcr() {
    var sc = state.scrollCapture;
    if (!sc.resultCanvas) return;

    var ocrCanvas = sc.resultCanvas;

    }).then(function(text) {
      if (!ocrCancelledRef.current) dispatch({ type: 'SC_UPDATE', v: { phase: 'OCR_RESULT', ocrText: text, ocrProgress: 100 } });

  // --- Block Text Pipeline ---
  var btRef = useRef({
    active: false, canvas: null, ctx: null,
    // Rolling frame buffer: [frame_0 (newest), frame_1, frame_2 (oldest)]
    frameBuffer: [],
    detectTimerId: null,

  // --- Utility: find pixels where saturation INCREASED between old and new frame ---
  // Returns only pixels that changed AND became more saturated (= selection highlight appeared)
  // Ignores cursor blinks, clock changes, etc. which are low-saturation changes
  // Also returns per-row highlight counts for row-based bounding box trimming
  function btFindHighlight(dataNew, dataOld, vw, vh, step, pixThreshold) {
    var a = dataNew.data; // frame_0 (current)
    var b = dataOld.data; // frame_2 (2 intervals ago)
    var minX = vw, minY = vh, maxX = 0, maxY = 0;
    var highlightCount = 0;
    var totalChanged = 0;
    var satIncreaseMin = 0.12; // minimum saturation increase to count as highlight
    var satAbsoluteMin = 0.15; // minimum absolute saturation in new frame
    var rowCounts = {}; // y -> count of highlight pixels in this row

    for (var y = 0; y < vh; y += step) {
      for (var x = 0; x < vw; x += step) {
        var idx = (y * vw + x) * 4;

        // Skip if pixel didn't change
        var dr = Math.abs(a[idx] - b[idx]);
        var dg = Math.abs(a[idx + 1] - b[idx + 1]);
        var db = Math.abs(a[idx + 2] - b[idx + 2]);
        if (dr + dg + db <= pixThreshold) continue;
        totalChanged++;

        // Compute saturation of new pixel (HSV)
        var rn = a[idx], gn = a[idx + 1], bn = a[idx + 2];
        var maxN = Math.max(rn, gn, bn), minN = Math.min(rn, gn, bn);
        var satNew = maxN === 0 ? 0 : (maxN - minN) / maxN;

        // Compute saturation of old pixel
        var ro = b[idx], go = b[idx + 1], bo = b[idx + 2];
        var maxO = Math.max(ro, go, bo), minO = Math.min(ro, go, bo);
        var satOld = maxO === 0 ? 0 : (maxO - minO) / maxO;

        // Is this a highlight pixel? (saturation went UP)
        if (satNew - satOld > satIncreaseMin && satNew > satAbsoluteMin) {
          highlightCount++;
          rowCounts[y] = (rowCounts[y] || 0) + 1;
          if (x < minX) minX = x;
          if (x > maxX) maxX = x;
          if (y < minY) minY = y;
          if (y > maxY) maxY = y;
        }
      }
    }

    return {
      highlightCount: highlightCount,
      totalChanged: totalChanged,
      minX: minX, minY: minY, maxX: maxX, maxY: maxY,
      rowCounts: rowCounts,
      valid: maxX > minX && maxY > minY
    };
  }

  // --- Simple stability check: ratio of changed pixels between two frames ---
  function btChangeRatio(dataA, dataB, vw, vh, step, threshold) {
    var a = dataA.data; var b = dataB.data;
    var changed = 0; var total = 0;
    for (var y = 0; y < vh; y += step) {
      for (var x = 0; x < vw; x += step) {
        var idx = (y * vw + x) * 4;
        var dr = Math.abs(a[idx] - b[idx]);
        var dg = Math.abs(a[idx + 1] - b[idx + 1]);
        var db = Math.abs(a[idx + 2] - b[idx + 2]);
        total++;
        if (dr + dg + db > threshold) changed++;
      }
    }
    return total > 0 ? changed / total : 0;
  }

  function btCaptureAndDetect() {
    var bt = btRef.current;
    if (!bt.active || bt.ocrInProgress) return;
    var video = videoRef.current;
    if (!video || video.readyState < 2) return;
    var vw = video.videoWidth; var vh = video.videoHeight;
    if (!bt.canvas) {
      bt.canvas = document.createElement('canvas');
      bt.canvas.width = vw; bt.canvas.height = vh;
      bt.ctx = bt.canvas.getContext('2d', { willReadFrequently: true });
    }
    bt.ctx.drawImage(video, 0, 0, vw, vh);
    var curFrame = bt.ctx.getImageData(0, 0, vw, vh);

    bt.frameBuffer.unshift(curFrame);
    if (bt.frameBuffer.length > 3) bt.frameBuffer.length = 3;

    // Cooldown after OCR — keep buffering frames but skip detection
    var inCooldown = Date.now() < bt.cooldownUntil;
    if (bt.frameBuffer.length < 3 || inCooldown) {
      dispatch({ type: 'BT_UPDATE', v: { detectStatus: 'idle', stabilityPct: 0, roiRect: null } });
      return;
    }

    var frame0 = bt.frameBuffer[0]; // current
    var frame1 = bt.frameBuffer[1]; // 1 interval ago
    var frame2 = bt.frameBuffer[2]; // 2 intervals ago
    var step = 4; var threshold = 40;

    // Step 1: Stability gate (relaxed) — screen should be mostly stable
    var stability = btChangeRatio(frame0, frame1, vw, vh, step, threshold);
    console.log('[BT] Step1 stability=' + (stability * 100).toFixed(2) + '% (need <1%)');
    if (stability >= 0.01) {
      // Screen still changing — not stable yet
      dispatch({ type: 'BT_UPDATE', v: { detectStatus: 'detected', stabilityPct: 0, roiRect: null } });
      return;
    }

    // Step 2: Find highlight pixels (saturation increased between frame_2 and frame_0)
    var hl = btFindHighlight(frame0, frame2, vw, vh, step, threshold);
    console.log('[BT] Step2 hlCount=' + hl.highlightCount + ' totalChanged=' + hl.totalChanged + ' valid=' + hl.valid);
    if (!hl.valid || hl.highlightCount < 20) {
      // No significant highlight appeared
      dispatch({ type: 'BT_UPDATE', v: { detectStatus: 'idle', stabilityPct: 0, roiRect: null } });
      return;
    }

    // Step 3: Row-based bounding box trimming — clip to contiguous band of highlight rows
    // This removes scattered noise pixels far above/below the actual selection
    var rowKeys = Object.keys(hl.rowCounts).map(Number).sort(function(a, b) { return a - b; });
    var peakCount = 0;
    for (var ri = 0; ri < rowKeys.length; ri++) {
      if (hl.rowCounts[rowKeys[ri]] > peakCount) peakCount = hl.rowCounts[rowKeys[ri]];
    }
    var rowThreshold = Math.max(1, Math.floor(peakCount * 0.10)); // rows need >10% of peak to qualify
    // Find first and last qualifying rows
    var trimMinY = hl.minY, trimMaxY = hl.maxY;
    for (var ri = 0; ri < rowKeys.length; ri++) {
      if (hl.rowCounts[rowKeys[ri]] >= rowThreshold) { trimMinY = rowKeys[ri]; break; }
    }
    for (var ri = rowKeys.length - 1; ri >= 0; ri--) {
      if (hl.rowCounts[rowKeys[ri]] >= rowThreshold) { trimMaxY = rowKeys[ri]; break; }
    }
    console.log('[BT] Step3 rowTrim peakCount=' + peakCount + ' rowThreshold=' + rowThreshold + ' trimY=[' + trimMinY + ',' + trimMaxY + '] origY=[' + hl.minY + ',' + hl.maxY + ']');

    // Step 4: Region size check (using trimmed bounds)
    var roiW = hl.maxX - hl.minX;
    var roiH = trimMaxY - trimMinY;
    var roiArea = roiW * roiH; var frameArea = vw * vh;
    var roiPct = (roiArea / frameArea * 100).toFixed(2);
    console.log('[BT] Step4 roiW=' + roiW + ' roiH=' + roiH + ' area=' + roiPct + '% (need 0.1%~40%)');
    if (roiArea < frameArea * 0.001 || roiArea > frameArea * 0.4) {
      dispatch({ type: 'BT_UPDATE', v: { detectStatus: 'idle', stabilityPct: 0, roiRect: null } });
      return;
    }

    // Step 5: Density check — highlight pixels should be concentrated, not scattered
    var boxSamples = (roiW / step) * (roiH / step);
    var density = boxSamples > 0 ? hl.highlightCount / boxSamples : 0;
    console.log('[BT] Step5 density=' + (density * 100).toFixed(2) + '% (need >=5%) hlCount=' + hl.highlightCount + ' boxSamples=' + Math.round(boxSamples));
    if (density < 0.05) {
      // Too sparse — likely noise
      dispatch({ type: 'BT_UPDATE', v: { detectStatus: 'idle', stabilityPct: 0, roiRect: null } });
      return;
    }

    // All checks passed: stable screen + new change + high saturation = text selection detected!
    var pad = 8;
    var rx = Math.max(0, ((hl.minX - pad) / vw) * 100);
    var ry = Math.max(0, ((trimMinY - pad) / vh) * 100);
    var rw = Math.min(100 - rx, ((roiW + pad * 2) / vw) * 100);
    var rh = Math.min(100 - ry, ((roiH + pad * 2) / vh) * 100);
    var roi = {
      x: rx, y: ry, w: rw, h: rh,
      px: Math.max(0, hl.minX - pad), py: Math.max(0, trimMinY - pad),
      pw: Math.min(vw, roiW + pad * 2), ph: Math.min(vh, roiH + pad * 2)
    };

    console.log('[BT] ✅ ALL PASSED! ROI: x=' + roi.px + ' y=' + roi.py + ' w=' + roi.pw + ' h=' + roi.ph + ' → triggering OCR');
    // Trigger OCR
    bt.ocrInProgress = true;
    dispatch({ type: 'BT_UPDATE', v: { detectStatus: 'stabilizing', stabilityPct: 100, roiRect: roi, phase: 'PROCESSING' } });
    btExtractAndOcr(roi, vw, vh);
  }

  function btExtractAndOcr(roi, vw, vh) {
    var bt = btRef.current;
    bt.ocrCancelled = false;
    // Extract ROI from canvas
    var sx = Math.max(0, Math.round(roi.px));
    var sy = Math.max(0, Math.round(roi.py));
    var sw = Math.min(vw - sx, Math.round(roi.pw));
    var sh = Math.min(vh - sy, Math.round(roi.ph));
    if (sw <= 0 || sh <= 0) {
      dispatch({ type: 'BT_UPDATE', v: { phase: 'MONITORING', detectStatus: 'idle', stabilityPct: 0, roiRect: null, errorMsg: 'ROI \uCD94\uCD9C \uC2E4\uD328' } });
      addToast('error', 'ROI \uCD94\uCD9C\uC5D0 \uC2E4\uD328\uD588\uC2B5\uB2C8\uB2E4.');
      bt.ocrInProgress = false;
      return;
    }
    var roiCanvas = document.createElement('canvas');
    roiCanvas.width = sw; roiCanvas.height = sh;
    var roiCtx = roiCanvas.getContext('2d');
    roiCtx.drawImage(bt.canvas, sx, sy, sw, sh, 0, 0, sw, sh);
    // Run OCR (use ref for latest ocrMethod to avoid stale closure)
    var ocrMethod = bt.latestOcrMethod || state.blockText.ocrMethod;
    OcrEngine.performOcr(roiCanvas, ocrMethod, state.settings, function(idx, total) {
      if (bt.ocrCancelled) return;
      dispatch({ type: 'BT_UPDATE', v: { ocrCurrentChunk: idx + 1, ocrChunks: total, ocrProgress: Math.round(((idx + 1) / total) * 100) } });
    }).then(function(text) {
      if (bt.ocrCancelled) return;
      if (text && text.trim()) {
        // Auto-copy to clipboard (with fallback for unfocused document)
        if (navigator.clipboard) {
          navigator.clipboard.writeText(text.trim()).catch(function(err) {
            console.warn('[BT] Clipboard write failed (document not focused?):', err.message);
          });
        }
        // Add to history (max 20, deduplicate consecutive)
        var normalizedText = text.trim();
        var prevHistory = bt.latestHistory || [];
        var isDuplicate = prevHistory.length > 0 && prevHistory[0].text.trim() === normalizedText;
        var newHistory;
        if (isDuplicate) {
          // Update timestamp of existing entry
          newHistory = prevHistory.slice();
          newHistory[0] = Object.assign({}, newHistory[0], { time: new Date().toLocaleTimeString('ko-KR', { hour12: false }) });
        } else {
          bt.historyId++;
          var entry = { id: bt.historyId, text: normalizedText, time: new Date().toLocaleTimeString('ko-KR', { hour12: false }) };
          newHistory = [entry].concat(prevHistory).slice(0, 20);
        }
        dispatch({ type: 'BT_UPDATE', v: { phase: 'MONITORING', detectStatus: 'idle', stabilityPct: 0, roiRect: null, processingText: normalizedText, history: newHistory, ocrProgress: 0, ocrChunks: 0, ocrCurrentChunk: 0, errorMsg: null } });
        addToast('success', '"' + normalizedText.substring(0, 50) + (normalizedText.length > 50 ? '...' : '') + '"', '\uD074\uB9BD\uBCF4\uB4DC\uC5D0 \uBCF5\uC0AC\uB418\uC5C8\uC2B5\uB2C8\uB2E4');
      } else {
        dispatch({ type: 'BT_UPDATE', v: { phase: 'MONITORING', detectStatus: 'idle', stabilityPct: 0, roiRect: null, ocrProgress: 0, errorMsg: 'OCR \uACB0\uACFC\uAC00 \uBE44\uC5B4 \uC788\uC2B5\uB2C8\uB2E4' } });
        addToast('warning', 'OCR \uACB0\uACFC\uAC00 \uBE44\uC5B4 \uC788\uC2B5\uB2C8\uB2E4. \uC120\uD0DD \uC601\uC5ED\uC744 \uB2E4\uC2DC \uC2DC\uB3C4\uD574 \uC8FC\uC138\uC694.');
      }
      // Reset detection state + cooldown to prevent re-triggering on deselection
      bt.ocrInProgress = false;
      bt.frameBuffer = [];
      bt.cooldownUntil = Date.now() + 5000; // 5s cooldown after OCR
    }).catch(function(err) {
      console.error('Block text OCR error:', err);
      if (!bt.ocrCancelled) {
        dispatch({ type: 'BT_UPDATE', v: { phase: 'MONITORING', detectStatus: 'idle', stabilityPct: 0, roiRect: null, ocrProgress: 0, errorMsg: 'OCR \uC624\uB958: ' + err.message } });
        addToast('error', 'OCR \uC624\uB958: ' + err.message);
      }
      bt.ocrInProgress = false;
      bt.frameBuffer = [];
      bt.cooldownUntil = Date.now() + 5000;
    });
  }

  function startBlockText() {
    var bt = btRef.current;
    bt.active = true; bt.canvas = null; bt.ctx = null;
    bt.frameBuffer = []; bt.ocrCancelled = false; bt.ocrInProgress = false;
    dispatch({ type: 'BT_UPDATE', v: { phase: 'MONITORING', detectStatus: 'idle', stabilityPct: 0, roiRect: null, processingText: '', errorMsg: null, ocrProgress: 0, ocrChunks: 0, ocrCurrentChunk: 0 } });
    // Ensure video ref gets the stream after React renders the <video> element
    setTimeout(function() { var el = videoRef.current; if (el && streamRef.current) el.srcObject = streamRef.current; }, 200);
    // Start detection loop at capture interval (default 1s)
    var intervalMs = (state.blockText.stabilityThreshold || 1) * 1000;
    bt.detectTimerId = setInterval(function() { btCaptureAndDetect(); }, intervalMs);
  }

  function stopBlockText() {
    var bt = btRef.current;
    bt.active = false; bt.ocrCancelled = true; bt.ocrInProgress = false;
    if (bt.detectTimerId) { clearInterval(bt.detectTimerId); bt.detectTimerId = null; }
    dispatch({ type: 'BT_UPDATE', v: { phase: 'SETUP', detectStatus: 'idle', stabilityPct: 0, roiRect: null, ocrProgress: 0, ocrChunks: 0, ocrCurrentChunk: 0, errorMsg: null } });
  }

  function btClearHistory() {
    dispatch({ type: 'BT_UPDATE', v: { history: [] } });
  }

  // Keyboard shortcuts
  useEffect(function() {
    function onKey(e) {
      // Fullscreen toggle
      if (e.code === 'KeyF' && !e.ctrlKey && !e.metaKey && !e.altKey) {
        var tag = (document.activeElement || {}).tagName;
        if (tag !== 'INPUT' && tag !== 'TEXTAREA' && tag !== 'SELECT') {
          e.preventDefault();
          if (state.isFullscreen) {
            dispatch({ type: 'SET_FULLSCREEN', v: false });
          } else if (canEnterFullscreen(state)) {
            dispatch({ type: 'SET_FULLSCREEN', v: true });
          }
        }
      }
      // Fullscreen exit on Escape
      if (e.code === 'Escape' && state.isFullscreen) {
        e.preventDefault();
        dispatch({ type: 'SET_FULLSCREEN', v: false });
        return;
      }
      var sc = state.scrollCapture;
      if (e.code === 'Space' && (sc.phase === 'READY' || sc.phase === 'CAPTURING') && state.mode === MODES.SC) {
        e.preventDefault();
        if (sc.phase === 'READY') startCapture();
        else stopCapture();
      }
      if (e.code === 'Escape' && state.mode === MODES.SC) {
        if (sc.phase === 'CAPTURING') stopCapture();
        else if (sc.phase === 'ASSEMBLING') cancelAssemble();
        else if (sc.phase === 'OCR_PROCESSING') scCancelOcr();
      }
      // Block text: Space to start/stop, Escape to stop
      var bt = state.blockText;
      if (e.code === 'Space' && state.mode === MODES.BT) {
        e.preventDefault();
        if (bt.phase === 'SETUP' && state.device.connected) startBlockText();
        else if (bt.phase === 'MONITORING') stopBlockText();
      }
      if (e.code === 'Escape' && state.mode === MODES.BT) {
        if (bt.phase === 'MONITORING' || bt.phase === 'PROCESSING') stopBlockText();
      }
    }
    window.addEventListener('keydown', onKey);
    return function() { window.removeEventListener('keydown', onKey); };
  });

  // Fullscreen auto-exit + capture-in-progress notification
  useEffect(function() {
    if (state.isFullscreen && shouldAutoExitFullscreen(state)) {
      dispatch({ type: 'SET_FULLSCREEN', v: false });
    }
  });

  var prevFullscreenRef = useRef(false);
  useEffect(function() {
    var wasFull = prevFullscreenRef.current;
    prevFullscreenRef.current = state.isFullscreen;
    if (wasFull && !state.isFullscreen && state.mode === MODES.SC && state.scrollCapture.phase === 'CAPTURING') {
      addToast('info', '캡처가 아직 진행 중입니다. Space 키 또는 종료 버튼으로 캡처를 종료하세요.', '캡처 진행 중');
    }
  });

  var canFs = canEnterFullscreen(state);

  return h(ViewportGuard, null,
    h('div', { className: 'h-full flex flex-col bg-zinc-900' },
      !state.isFullscreen ? h(TopBar, { mode: state.mode, dispatch: dispatch }) : null,
      h('div', { className: S.mainLayout },
        !state.isFullscreen ? h(SidebarSwitch, { state: state, dispatch: dispatch, style: { width: sidebarWidth + 'px' }, onStartCapture: startCapture, onStopCapture: stopCapture, onCancelAssemble: cancelAssemble, onStartOcr: scStartOcr, onCancelOcr: scCancelOcr, onCopyText: scCopyText, onDownloadText: scDownloadText, onStartReceive: startReceive, onStopReceive: stopReceive, onDownloadFile: downloadReceivedFile, onNewReceive: newReceive, onStartBlockText: startBlockText, onStopBlockText: stopBlockText, onClearHistory: btClearHistory }) : null,
        !state.isFullscreen ? h(SidebarResizeHandle, { width: sidebarWidth, onChange: setSidebarWidth }) : null,
        h(MainContent, { state: state, stream: stream, videoRef: videoRef, dispatch: dispatch, onCopyText: scCopyText, onDownloadText: scDownloadText, onRequestPermission: requestCameraPermission, isFullscreen: state.isFullscreen, canFullscreen: canFs })
      ),
      state.isFullscreen ? h(FullscreenOverlay, {
        state: state,
        dispatch: dispatch,
        onStartCapture: startCapture,
        onStopCapture: stopCapture,
        onStartBlockText: startBlockText,
        onStopBlockText: stopBlockText,
        addToast: addToast,
      }) : null,
      !state.isFullscreen ? h(StatusBar, { state: state }) : null,
      h(ToastContainer, { toasts: toasts, onDismiss: dismissToast })
    )
  );
}

/* ═══════════════════════════════════════════════════════════════
   Render
   ═══════════════════════════════════════════════════════════════ */

ReactDOM.createRoot(document.getElementById('root')).render(h(App));

</script>
</body>
